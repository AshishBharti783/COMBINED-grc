# =============================================================
#  iSecurify GRC Platform — Nginx Internal Reverse Proxy
#  Copy to: /etc/nginx/sites-available/isecurify
#  Then:    sudo ln -sf /etc/nginx/sites-available/isecurify /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
#  Architecture:
#    Internet → Apache2 (:443 SSL) → Nginx (:8080) → Bun/Next.js (:3000) → MySQL (:3306)
#
#  IMPORTANT: This Nginx server block listens on 127.0.0.1:8080 ONLY.
#  Apache2 is the public-facing edge on :80/:443 — do NOT bind Nginx to
#  0.0.0.0:80 or :443 here, that would conflict with Apache2.
# =============================================================

server {
    # Internal-only listener. Apache2 (the public edge) reverse-proxies
    # all public traffic to this address.
    listen 127.0.0.1:8080;
    server_name _;

    # ---- Security Headers ----
    # (Apache2 also sets these at the edge; setting them here too means
    #  the protection applies even if Apache2's header config is later
    #  modified. Headers already set by Apache2 are NOT overridden —
    #  Nginx only adds headers that are missing from the upstream response.)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # ---- File Upload Limits ----
    # Matches Apache2's LimitRequestBody — keep both in sync.
    client_max_body_size 50M;

    # ---- Proxy to Bun/Next.js on :3000 ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests (evidence uploads, report generation)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering off;
        proxy_buffer_size 8k;
    }

    # ---- Static Files Caching (Next.js build assets) ----
    # _next/static/ contains hashed, immutable build assets — cache aggressively.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
    }

    # Brand icon — cached for 30 days
    location /isecurify-icon.png {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Health Check (no access logging to keep journals clean) ----
    location /api/auth/me {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # ---- Deny sensitive files ----
    location ~ /\. {
        deny all;
    }
    location ~ /prisma/ {
        deny all;
    }
}
