# =============================================================
#  iSecurify GRC Platform — Apache2 Edge Virtual Host
#  Copy to: /etc/apache2/sites-available/isecurify.conf
#  Then:    sudo a2enmod proxy proxy_http ssl headers rewrite
#           sudo a2ensite isecurify
#           sudo apache2ctl configtest && sudo systemctl reload apache2
#           sudo certbot --apache -d isecurify.yourdomain.com
#
#  Architecture:
#    Internet → Apache2 (:443 SSL) → Nginx (:8080) → Bun/Next.js (:3000) → MySQL (:3306)
#
#  Apache2 is the PUBLIC-FACING edge server. It terminates SSL,
#  redirects HTTP → HTTPS, and reverse-proxies everything to Nginx
#  on 127.0.0.1:8080 (which in turn proxies to the Bun/Next.js process
#  on 127.0.0.1:3000).
#
#  Required Apache modules (enable BEFORE activating this site):
#    sudo a2enmod proxy proxy_http ssl headers rewrite
# =============================================================

# ---- HTTP :80 — redirect to HTTPS ----
<VirtualHost *:80>
    ServerName isecurify.yourdomain.com        # ← CHANGE THIS

    # Let's Encrypt HTTP-01 challenge must be served over :80 before SSL
    # is issued. certbot --apache manages this block automatically — leave
    # it in place so renewals keep working.
    ProxyPreserveHost On
    ProxyPass        /.well-known/acme-challenge/ !
    DocumentRoot     /var/www/html

    # Redirect everything else to HTTPS
    RewriteEngine On
    RewriteRule ^/?(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

# ---- HTTPS :443 — public edge, SSL termination, reverse proxy to Nginx ----
<VirtualHost *:443>
    ServerName isecurify.yourdomain.com        # ← CHANGE THIS

    # ---- SSL (Let's Encrypt / certbot) ----
    # Paths below are placeholders — certbot --apache will rewrite them
    # to point at the real certificate files after the first SSL issuance.
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/isecurify.yourdomain.com/fullchain.pem    # ← CHANGE
    SSLCertificateKeyFile   /etc/letsencrypt/live/isecurify.yourdomain.com/privkey.pem      # ← CHANGE

    # ---- SSL Hardening ----
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    SSLHonorCipherOrder     on
    SSLSessionTickets       off
    SSLSessionCache         shmcb:/var/cache/apache2/mod_ssl/scache(512000)
    SSLSessionCacheTimeout  300

    # ---- Security Headers ----
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    # ---- File Upload Limits (matches Nginx client_max_body_size) ----
    LimitRequestBody 52428800

    # ---- Reverse Proxy to Nginx (internal :8080) ----
    # Apache2 → Nginx → Bun/Next.js. Two-hop proxying keeps Nginx's
    # static-asset caching and security-header layer in the path even
    # though Apache2 is the public SSL terminator.
    ProxyPreserveHost On
    ProxyRequests Off

    # Forward the client's original IP + protocol so the Next.js app
    # sees real request metadata, not 127.0.0.1.
    ProxyAddHeaders On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port   "443"

    # Timeouts for long-running requests (evidence uploads, report generation)
    ProxyTimeout 120
    ProxyReceiveBufferSize 8192

    # Reverse-proxy everything to Nginx on :8080.
    # The trailing slash on the ProxyPass target makes Apache strip the
    # leading path component — we want the full original URI passed through,
    # so NO trailing slash on the source, and the target URL has no path.
    ProxyPass        /  http://127.0.0.1:8080/  connectiontimeout=60 timeout=120
    ProxyPassReverse /  http://127.0.0.1:8080/

    # ---- HSTS + Logging ----
    ErrorLog  ${APACHE_LOG_DIR}/isecurify_error.log
    CustomLog ${APACHE_LOG_DIR}/isecurify_access.log combined
</VirtualHost>

# =============================================================
#  Post-install checklist:
#  1. sudo a2enmod proxy proxy_http ssl headers rewrite
#  2. sudo a2dissite 000-default  (if present, to free :80)
#  3. sudo a2ensite isecurify
#  4. sudo apache2ctl configtest
#  5. sudo systemctl reload apache2
#  6. sudo certbot --apache -d isecurify.yourdomain.com
#  7. sudo systemctl reload apache2  (certbot will reload it, but just in case)
# =============================================================
